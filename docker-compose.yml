name: autostore

services:
  postgres:
    image: postgres:16-alpine
    container_name: autostore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autostore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - autostore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autostore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autostore-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: autostore-image
    container_name: autostore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=autostore;Username=postgres;Password=postgres"
    ports:
      - "8024:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - autostore-net

volumes:
  autostore_data:
    driver: local

networks:
  autostore-net:
    driver: bridge
